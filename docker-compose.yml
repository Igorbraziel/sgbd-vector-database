services:
  # =============================================================
  # Qdrant — SGBD Vetorial
  # =============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sgbd-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================
  # App — Streamlit UI + RAG Pipeline
  # =============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgbd-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local

